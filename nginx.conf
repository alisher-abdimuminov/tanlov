server {
    listen 80;
    listen [::]:80;
    server_name tanlov.samdpi.uz www.samdpi.uzfi.uz;

    location = /favicon.ico { access_log off; log_not_found off; }
    location /static/ {
        root /home/ali/tanlovs;
    }

    location /media/ {
        root /home/ali/tanlovs;
    }

    location / {
       include proxy_params;
       proxy_pass http://unix:/run/tanlovs.sock;
    }
}
